<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 132" role="img" aria-labelledby="title desc">
  <title id="title">BVM Surveillance logo</title>
  <desc id="desc">A modern BVM Surveillance logo with a shield, camera lens, signal lines, and a premium wordmark.</desc>
  <defs>
    <linearGradient id="markStroke" x1="18" y1="12" x2="112" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffcc73" />
      <stop offset="0.48" stop-color="#f4b24d" />
      <stop offset="1" stop-color="#42d2c5" />
    </linearGradient>
    <linearGradient id="markFill" x1="20" y1="18" x2="112" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182638" />
      <stop offset="1" stop-color="#071018" />
    </linearGradient>
    <linearGradient id="lens" x1="39" y1="36" x2="91" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8eef8" />
      <stop offset="0.28" stop-color="#42d2c5" />
      <stop offset="1" stop-color="#0c1823" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g>
    <path d="M66 9 L113 29 L106 86 C102 101 89 115 66 124 C43 115 30 101 26 86 L19 29 Z" fill="url(#markFill)" stroke="url(#markStroke)" stroke-width="5" />
    <path d="M40 43 H92 V79 H40 Z" fill="#0b1722" stroke="#f4b24d" stroke-width="3" />
    <path d="M50 36 H82 L89 43 H43 Z" fill="#f4b24d" opacity="0.95" />
    <circle cx="66" cy="61" r="20" fill="#071018" stroke="url(#lens)" stroke-width="7" />
    <circle cx="66" cy="61" r="8" fill="#42d2c5" filter="url(#softGlow)" />
    <path d="M93 51 C102 54 108 61 110 70" fill="none" stroke="#42d2c5" stroke-width="4" stroke-linecap="round" />
    <path d="M98 39 C112 45 121 56 124 71" fill="none" stroke="#42d2c5" stroke-width="3" stroke-linecap="round" opacity="0.68" />
    <path d="M38 91 H94" stroke="#ffcc73" stroke-width="4" stroke-linecap="round" />
    <path d="M50 101 H82" stroke="#42d2c5" stroke-width="4" stroke-linecap="round" />
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="150" y="74" fill="#f8fafc" font-size="58" font-weight="950" letter-spacing="3">BVM</text>
    <text x="154" y="103" fill="#ffcc73" font-size="20" font-weight="850" letter-spacing="6">SURVEILLANCE</text>
    <path d="M152 88 H485" stroke="#23384b" stroke-width="2" />
    <path d="M392 101 H488" stroke="#42d2c5" stroke-width="4" stroke-linecap="round" opacity="0.9" />
  </g>
</svg>
